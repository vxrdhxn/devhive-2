version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: ktp_postgres
    environment:
      POSTGRES_DB: ktp_db
      POSTGRES_USER: ktp_user
      POSTGRES_PASSWORD: ktp_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ktp_user -d ktp_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
